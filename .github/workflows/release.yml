name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # A tag that does not match the workspace version would ship binaries
  # that nag themselves as outdated forever.
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match workspace version $version" >&2
            exit 1
          fi

  build:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          # Cross-compiled on the arm64 runner; macos-13 x64 runners queue
          # for hours.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release -p grandmasend-cli --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tar -C target/${{ matrix.target }}/release -czf grandmasend-${{ matrix.target }}.tar.gz grandmasend
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/grandmasend.exe -DestinationPath grandmasend-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: grandmasend-${{ matrix.target }}
          path: grandmasend-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            $(case "$GITHUB_REF_NAME" in *-*) echo --prerelease ;; esac) \
            dist/* \
            scripts/bootstrap.sh scripts/bootstrap.ps1 \
            scripts/install.sh scripts/install.ps1
